<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="synorixLogoTitle">
  <title id="synorixLogoTitle">Synorix</title>
  <defs>
    <linearGradient id="synorixLogoStroke" x1="64" y1="96" x2="448" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f0ff"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="synorixLogoGlow" x1="256" y1="64" x2="256" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="synorixLogoBlur" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft outer glow -->
  <circle cx="256" cy="256" r="168" fill="url(#synorixLogoGlow)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="188" stroke="url(#synorixLogoStroke)" stroke-width="10" stroke-opacity="0.45"/>
  <!-- Main ring -->
  <circle cx="256" cy="256" r="164" stroke="url(#synorixLogoStroke)" stroke-width="14" filter="url(#synorixLogoBlur)"/>
  <!-- SNRX monogram: stylized S + energy nodes -->
