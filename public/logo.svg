    d="M312 168c28 0 52 22 52 52 0 28-18 46-44 54l-36 12c-12 4-20 14-20 26 0 16 14 28 32 28h8c18 0 32-10 38-24l44 22c-12 34-46 58-86 58-48 0-84-34-84-78 0-36 24-60 54-70l34-12c16-6 26-18 26-34 0-22-18-38-42-38h-12c-26 0-46 16-54 38l-48-20c14-42 52-72 100-72h20z"
    fill="url(#synorixLogoStroke)"
    opacity="0.95"
  />
  <circle cx="178" cy="200" r="14" fill="#0a0e1a" stroke="#00f0ff" stroke-width="4"/>
  <circle cx="334" cy="312" r="14" fill="#0a0e1a" stroke="#00f0ff" stroke-width="4"/>
